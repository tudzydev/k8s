apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-data-pv
  namespace: demomongo
spec:
# accessModes คือวิธีการเข้าถึง PersistentVolume โดยในที่นี้ใช้ ReadWriteOnce ซึ่งหมายความว่า PersistentVolume นี้สามารถถูกเชื่อมต่อและเขียนได้โดย Pod เดียวเท่านั้น และไม่สามารถถูกแชร์ระหว่างหลาย Pod ได้ ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความปลอดภัยและความเสถียรของข้อมูล เช่น ฐานข้อมูล MongoDB ที่เรากำลังตั้งค่าอยู่ในตัวอย่างนี้  ReadWriteMany จะอนุญาตให้หลาย Pod เข้าถึงและเขียนข้อมูลได้พร้อมกัน ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความยืดหยุ่นในการเข้าถึงข้อมูล เช่น การแชร์ไฟล์ระหว่างหลาย Pod ในขณะที่ ReadOnlyMany จะอนุญาตให้หลาย Pod เข้าถึงข้อมูลได้พร้อมกันแต่ไม่สามารถเขียนข้อมูลได้ ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความปลอดภัยของข้อมูล เช่น การแชร์ไฟล์ที่ไม่ต้องการให้มีการแก้ไขข้อมูลโดย Pod อื่นๆ ในกรณีนี้เราใช้ ReadWriteOnce เพราะเราต้องการให้ MongoDB สามารถเขียนข้อมูลได้อย่างปลอดภัยโดย Pod เดียวเท่านั้น ซึ่งจะช่วยป้องกันปัญหาการเขียนข้อมูลที่เกิดจากหลาย Pod ที่พยายามเขียนข้อมูลพร้อมกันและทำให้ข้อมูลเสียหายได้ ReadWriteOnlyMany จะอนุญาตให้หลาย Pod เข้าถึงข้อมูลได้พร้อมกันแต่ไม่สามารถเขียนข้อมูลได้ ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความปลอดภัยของข้อมูล เช่น การแชร์ไฟล์ที่ไม่ต้องการให้มีการแก้ไขข้อมูลโดย Pod อื่นๆ ในกรณีนี้เราใช้ ReadWriteOnce เพราะเราต้องการให้ MongoDB สามารถเขียนข้อมูลได้อย่างปลอดภัยโดย Pod เดียวเท่านั้น ซึ่งจะช่วยป้องกันปัญหาการเขียนข้อมูลที่เกิดจากหลาย Pod ที่พยายามเขียนข้อมูลพร้อมกันและทำให้ข้อมูลเสียหายได้
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
# Retain: เมื่อ PersistentVolume ถูกปล่อย (Released) จะไม่ถูกลบออกจากระบบ แต่จะยังคงอยู่ในสถานะ Released และต้องมีการจัดการด้วยตนเองเพื่อให้สามารถนำกลับมาใช้ใหม่ได้
# Recycle: เมื่อ PersistentVolume ถูกปล่อย (Released) จะถูกลบข้อมูลทั้งหมดออกจากระบบและจะถูกนำกลับมาใช้ใหม่ในสถานะ Available โดยอัตโนมัติ ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความสะดวกในการจัดการ PersistentVolume ที่ไม่ต้องการความปลอดภัยของข้อมูล เช่น การแชร์ไฟล์ที่ไม่สำคัญมาก
# Delete: เมื่อ PersistentVolume ถูกปล่อย (Released) จะถูกลบออกจากระบบโดยอัตโนมัติ ซึ่งเหมาะสำหรับการใช้งานที่ต้องการความสะดวกในการจัดการ PersistentVolume ที่ไม่ต้องการความปลอดภัยของข้อมูล เช่น การแชร์ไฟล์ที่ไม่สำคัญมาก
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /data/mongo