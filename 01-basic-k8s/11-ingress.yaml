apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  namespace: demok8s
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
# คิแ อการกำหนดกฎการเข้าถึงสำหรับ Ingress โดยมีการกำหนด host และ path ที่จะเชื่อมต่อกับ service ต่างๆ ใน cluster pathType: Prefix หมายความว่า ทุก path ที่ขึ้นต้นด้วย /api/ จะถูกส่งไปยัง server-service และทุก path ที่ขึ้นต้นด้วย / จะถูกส่งไปยัง client-service
spec:
  rules:
  - host: todo.site
    http:
      paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: server-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-service
                port:
                  number: 80