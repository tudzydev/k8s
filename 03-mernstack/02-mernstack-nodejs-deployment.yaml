# Node.js Backend Deployment สำหรับ MERN Stack
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-deployment  # ชื่อ Deployment
  namespace: mernstack  # namespace สำหรับ MERN Stack
  labels:
    app: nodejs  # ติดป้ายให้ Deployment นี้
spec:
  replicas: 3  # จำนวน Pod replica ของ Node.js (3 instances สำหรับ high availability)
  selector:
    matchLabels:
      app: nodejs  # เลือก Pod ที่มี label "app: nodejs"
  template:
    metadata:
      labels:
        app: nodejs  # ติดป้ายให้ Pod นี้
    spec:
      containers:
        # คอนเทนเนอร์ Node.js Backend สำหรับ MERN Stack
        - name: nodejs
          image: iamsamitdev/mern_nodejs:1.0  # ใช้ custom Node.js image สำหรับ MERN
          imagePullPolicy: Always  # ดึง Image ใหม่ทุกครั้งเมื่อ deploy
          ports:
            - containerPort: 3000  # Node.js application port
          # Resource requests/limits
          resources:
            requests:  # ขออนุญาตของ resources ขั้นต่ำ
              memory: "128Mi"  # ขอหน่วยความจำ 128 MB
              cpu: "250m"  # ขอ CPU 0.25 cores
            limits:  # ขีดจำกัด resources สูงสุด
              memory: "256Mi"  # สูงสุด 256 MB หน่วยความจำ
              cpu: "500m"  # สูงสุด 0.5 cores CPU
          # ตัวแปรสภาพแวดล้อมสำหรับการเชื่อมต่อ MongoDB
          env:
            # ชื่อผู้ใช้ฐานข้อมูล ดึงมาจาก Secret
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: username
            # รหัสผ่านฐานข้อมูล ดึงมาจาก Secret
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: password
            # ชื่อ hostname/service ของ MongoDB
            - name: DATABASE_HOST
              value: "mongodb-service"  # ชี้ไปยัง MongoDB Service name
---
# Node.js Service - เปิดให้เข้าถึง Node.js Backend ภายใน cluster
apiVersion: v1
kind: Service
metadata:
  name: nodejs-service  # ชื่อของ Service
  namespace: mernstack  # namespace ที่ใช้
spec:
  type: ClusterIP  # ประเภท Service: ClusterIP (เข้าถึงได้เฉพาะภายใน cluster)
  ports:
    - protocol: TCP  # protocol ที่ใช้
      port: 3000  # port ของ Service (internal)
      targetPort: 3000  # port ของ Node.js container
  selector:
    app: nodejs  # เลือก Pod ที่มี label "app: nodejs"